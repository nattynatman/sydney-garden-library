<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sydney Garden Library</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #f9f8f5;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-hover: rgba(0,0,0,0.2);
    --text: #1a1a1a;
    --muted: #666;
    --faint: #999;
    --accent: #3b6d11;
    --accent-light: #eaf3de;
    --pill-bg: #f0efe9;
    --pill-text: #444;
    --tag-fruit: #faeeda; --tag-fruit-t: #854f0b;
    --tag-veg: #eaf3de; --tag-veg-t: #3b6d11;
    --tag-herb: #e1f5ee; --tag-herb-t: #0f6e56;
    --tag-flower: #fbeaf0; --tag-flower-t: #993556;
    --tag-native: #e6f1fb; --tag-native-t: #185fa5;
    --tag-tree: #f1efe8; --tag-tree-t: #5f5e5a;
    --tag-shrub: #eeedfe; --tag-shrub-t: #534ab7;
    --overlay: rgba(0,0,0,0.45);
    --radius: 12px;
    --modal-radius: 16px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #161614;
      --surface: #1f1f1d;
      --border: rgba(255,255,255,0.1);
      --border-hover: rgba(255,255,255,0.2);
      --text: #f0efe9;
      --muted: #aaa;
      --faint: #666;
      --accent: #97c459;
      --accent-light: #27500a;
      --pill-bg: #2a2a27;
      --pill-text: #ccc;
      --tag-fruit: #633806; --tag-fruit-t: #fac775;
      --tag-veg: #27500a; --tag-veg-t: #c0dd97;
      --tag-herb: #085041; --tag-herb-t: #9fe1cb;
      --tag-flower: #72243e; --tag-flower-t: #f4c0d1;
      --tag-native: #0c447c; --tag-native-t: #b5d4f4;
      --tag-tree: #444441; --tag-tree-t: #d3d1c7;
      --tag-shrub: #3c3489; --tag-shrub-t: #cecbf6;
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 3rem 2rem 1.5rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  header h1 {
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  header p {
    font-size: 14px;
    color: var(--muted);
  }
  .controls {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 2rem 1.5rem;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 320px;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--faint);
    pointer-events: none;
  }
  input[type=search] {
    width: 100%;
    padding: 9px 12px 9px 36px;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type=search]:focus { border-color: var(--border-hover); }
  input[type=search]::placeholder { color: var(--faint); }
  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 7px 14px;
    border-radius: 100px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .filter-btn.active { background: var(--accent-light); color: var(--accent); border-color: transparent; font-weight: 500; }
  .diff-btn {
    padding: 7px 14px;
    border-radius: 100px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .diff-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .diff-btn.active { background: #faeeda; color: #854f0b; border-color: transparent; font-weight: 500; }
  @media (prefers-color-scheme: dark) {
    .diff-btn.active { background: #633806; color: #fac775; }
  }
  .count {
    font-size: 13px;
    color: var(--faint);
    margin-left: auto;
    align-self: center;
  }
  .grid {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 2rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    overflow: hidden;
  }
  .card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
  .card-emoji {
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    background: var(--pill-bg);
    user-select: none;
  }
  .card-body { padding: 14px; }
  .card-name { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
  .card-latin { font-size: 12px; color: var(--faint); font-style: italic; margin-bottom: 10px; }
  .card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 100px;
    font-weight: 500;
  }
  .tag-fruit { background: var(--tag-fruit); color: var(--tag-fruit-t); }
  .tag-veg { background: var(--tag-veg); color: var(--tag-veg-t); }
  .tag-herb { background: var(--tag-herb); color: var(--tag-herb-t); }
  .tag-flower { background: var(--tag-flower); color: var(--tag-flower-t); }
  .tag-native { background: var(--tag-native); color: var(--tag-native-t); }
  .tag-tree { background: var(--tag-tree); color: var(--tag-tree-t); }
  .tag-shrub { background: var(--tag-shrub); color: var(--tag-shrub-t); }
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 4rem 2rem;
    color: var(--faint);
    font-size: 15px;
  }

  /* Modal */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: var(--overlay);
    z-index: 100;
    padding: 2rem;
    overflow-y: auto;
    align-items: flex-start;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--modal-radius);
    border: 0.5px solid var(--border);
    width: 100%;
    max-width: 620px;
    margin: auto;
  }
  .modal-header {
    padding: 2rem 2rem 1.5rem;
    display: flex;
    gap: 1.5rem;
    align-items: flex-start;
    border-bottom: 0.5px solid var(--border);
  }
  .modal-emoji { font-size: 56px; line-height: 1; }
  .modal-title-wrap { flex: 1; }
  .modal-title { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .modal-latin { font-size: 14px; color: var(--faint); font-style: italic; margin-bottom: 12px; }
  .modal-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .modal-close {
    background: none;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    width: 32px; height: 32px;
    cursor: pointer;
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .modal-close:hover { background: var(--pill-bg); }
  .modal-body { padding: 1.5rem 2rem 2rem; }
  .modal-section { margin-bottom: 1.5rem; }
  .modal-section:last-child { margin-bottom: 0; }
  .modal-section h3 {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 8px;
  }
  .modal-section p, .modal-section ul {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
  }
  .modal-section ul { padding-left: 1.2rem; }
  .modal-section ul li { margin-bottom: 4px; }
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .stat {
    background: var(--pill-bg);
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
  }
  .stat-val { font-size: 13px; font-weight: 500; color: var(--text); }
  .stat-key { font-size: 11px; color: var(--faint); margin-top: 2px; }
  .difficulty {
    display: flex; gap: 3px; justify-content: center; margin-bottom: 2px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
  .dot.on { background: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>Sydney Garden Library</h1>
  <p>Plants suited to Sydney's climate — warm temperate, humid, frost-free coastal growing</p>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="search" placeholder="Search plants…" autocomplete="off">
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn" data-cat="fruit">Fruit trees</button>
    <button class="filter-btn" data-cat="veg">Vegetables</button>
    <button class="filter-btn" data-cat="herb">Herbs</button>
    <button class="filter-btn" data-cat="flower">Flowers</button>
    <button class="filter-btn" data-cat="native">Natives</button>
    <button class="filter-btn" data-cat="shrub">Shrubs</button>
    <button class="filter-btn" data-cat="tree">Trees</button>
  </div>
  <div class="filters" id="difficulty-filters">
    <button class="diff-btn active" data-diff="all">Any difficulty</button>
    <button class="diff-btn" data-diff="1">Easy</button>
    <button class="diff-btn" data-diff="2">Moderate</button>
    <button class="diff-btn" data-diff="3">Advanced</button>
  </div>
  <span class="count" id="count"></span>
</div>

<div class="grid" id="grid"></div>

<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-emoji" id="m-emoji"></div>
      <div class="modal-title-wrap">
        <div class="modal-title" id="m-name"></div>
        <div class="modal-latin" id="m-latin"></div>
        <div class="modal-tags" id="m-tags"></div>
      </div>
      <button class="modal-close" id="modal-close" aria-label="Close">×</button>
    </div>
    <div class="modal-body" id="m-body"></div>
  </div>
</div>

    const matchDiff = activeDiff === "all" || p.difficulty === parseInt(activeDiff);
    const q = query.toLowerCase();
    const matchQ = !q || p.name.toLowerCase().includes(q) || p.latin.toLowerCase().includes(q);
    return matchCat && matchDiff && matchQ;
  });
  countEl.textContent = filtered.length + " plant" + (filtered.length !== 1 ? "s" : "");
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">No plants found — try a different search or filter.</div>';
    return;
  }
  grid.innerHTML = filtered.map((p, i) => `
    <div class="card" data-idx="${plants.indexOf(p)}" tabindex="0" role="button" aria-label="View ${p.name} details">
      <div class="card-emoji">${p.emoji}</div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-latin">${p.latin}</div>
        <div class="card-tags">${p.cats.map(c => `<span class="tag ${catColors[c]}">${catLabels[c]}</span>`).join("")}</div>
      </div>
    </div>
  `).join("");
  grid.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", () => openModal(parseInt(card.dataset.idx)));
    card.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") openModal(parseInt(card.dataset.idx)); });
  });
}

function openModal(idx) {
  const p = plants[idx];
  document.getElementById("m-emoji").textContent = p.emoji;
  document.getElementById("m-name").textContent = p.name;
  document.getElementById("m-latin").textContent = p.latin;
  document.getElementById("m-tags").innerHTML = p.cats.map(c => `<span class="tag ${catColors[c]}">${catLabels[c]}</span>`).join("");

  const dots = d => Array.from({length: 3}, (_,i) => `<div class="dot ${i < d ? 'on' : ''}"></div>`).join("");
  document.getElementById("m-body").innerHTML = `
    <div class="stats-row">
      <div class="stat">
        <div class="difficulty">${dots(p.difficulty)}</div>
        <div class="stat-key">Difficulty</div>
      </div>
      <div class="stat">
        <div class="stat-val">${p.sun}</div>
        <div class="stat-key">Sunlight</div>
      </div>
      <div class="stat">
        <div class="stat-val">${p.water}</div>
        <div class="stat-key">Water</div>
      </div>
    </div>
    <div class="modal-section">
      <h3>Season</h3>
      <p>${p.season}</p>
    </div>
    <div class="modal-section">
      <h3>How to grow</h3>
      <p>${p.grow}</p>
    </div>
    <div class="modal-section">
      <h3>Landscape use</h3>
      <p>${p.landscape}</p>
    </div>
    <div class="modal-section">
      <h3>In Sydney</h3>
      <p>${p.sydney}</p>
    </div>
    <div class="modal-section">
      <h3>Interesting facts</h3>
      <ul>${p.facts.map(f => `<li>${f}</li>`).join("")}</ul>
    </div>
  `;
  document.getElementById("modal-bg").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal-bg").classList.remove("open");
  document.body.style.overflow = "";
}

document.getElementById("modal-close").addEventListener("click", closeModal);
document.getElementById("modal-bg").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-bg")) closeModal();
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

document.getElementById("filters").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeFilter = btn.dataset.cat;
  renderGrid();
});

document.getElementById("difficulty-filters").addEventListener("click", e => {
  const btn = e.target.closest(".diff-btn");
  if (!btn) return;
  document.querySelectorAll(".diff-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeDiff = btn.dataset.diff;
  renderGrid();
});

document.getElementById("search").addEventListener("input", e => {
  query = e.target.value;
  renderGrid();
});

renderGrid();
</script>
</body>
</html>
